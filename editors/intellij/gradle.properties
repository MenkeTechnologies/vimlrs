pluginGroup=com.menketechnologies.vimlrs
pluginName=vimlrs-intellij
pluginRepositoryUrl=https://github.com/MenkeTechnologies/vimlrs

# Bumped in lockstep with vimlrs Cargo.toml (workspace version)
pluginVersion=0.1.0

# Supported IDE range. 2025.2 = build 252, 2026.1 = build 261. Platform
# LSP API is paid-IDE only.
pluginSinceBuild=252
pluginUntilBuild=261.*

platformType=IU
# Targeting 2025.2 so we compile against the module-split platform
# (lib/modules/intellij.spellchecker.jar) — matches the runtime layout
# in current RustRover / IDEA (2025.2 / 2026.1.1) and lets us declare
# `bundledModule("intellij.spellchecker")` in build.gradle.kts plus
# `<depends>com.intellij.spellchecker</depends>` in plugin.xml so the
# `spellchecker.support` EP actually loads. The previous 2024.2.4 SDK
# embedded spellchecker in the main platform JAR which made the depends
# tag invalid (no separately-installable plugin ID by that name) and
# failed plugin verification.
platformVersion=2025.2

# JVM
javaVersion=17

# JVM used by Gradle. Picks up `$JAVA_HOME` from the environment by
# default (which `actions/setup-java@v4` exports in CI to the JDK 17
# install the workflow requests). DO NOT hardcode an absolute path
# here — committing a personal `/Users/<you>/...` path breaks every
# other contributor + CI runner.
#
# Multi-JDK local dev: if you have Java 25+ installed alongside 17
# and `java -version` reports the wrong one, set
#   org.gradle.java.home=/abs/path/to/jdk17
# in your USER-level config at `~/.gradle/gradle.properties` — that
# overrides project gradle.properties without polluting the repo.
# Kotlin 2.0.21 (pinned by IntelliJ Platform Gradle Plugin 2.16)
# can't parse the 3-part version string of newer JDKs (`25.0.2`,
# `26.0.1`, …) inside `JavaVersion.parse` so JDK 17 is required.

kotlin.code.style=official
org.gradle.caching=true
org.gradle.parallel=true
org.gradle.configuration-cache=true
org.gradle.jvmargs=-Xmx2g -XX:+UseG1GC
